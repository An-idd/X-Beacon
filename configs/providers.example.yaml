# Provider catalog template. Copy to providers.yaml (or let `make dev`
# do it for you) and ensure the referenced env vars are set before
# launching the gateway.
#
# All three adapters are enabled by default; comment out any provider
# whose API key isn't available.

providers:
  - name: openai-primary
    type: openai
    endpoint: https://api.openai.com
    api_key: ${OPENAI_API_KEY}
    organization: ${OPENAI_ORG:-}
    timeout: 60s
    priority: 10
    models:
      exact:
        - gpt-4o
        - gpt-4o-mini
      glob:
        - gpt-4-*
        - gpt-3.5-*

  - name: anthropic-primary
    type: anthropic
    endpoint: https://api.anthropic.com
    api_key: ${ANTHROPIC_API_KEY}
    timeout: 60s
    priority: 10
    models:
      exact:
        - claude-3-5-sonnet-20241022
        - claude-3-5-haiku-20241022
      glob:
        - claude-3-*

  - name: deepseek-primary
    type: deepseek
    endpoint: https://api.deepseek.com
    api_key: ${DEEPSEEK_API_KEY}
    timeout: 60s
    priority: 5
    models:
      exact:
        - deepseek-chat
        - deepseek-reasoner

default_provider: openai-primary
