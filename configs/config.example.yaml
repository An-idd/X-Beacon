server:
  addr: ":8080"
  read_timeout: 10s
  # write timeout must accommodate slow LLM streams; tune per upstream SLA
  write_timeout: 600s
  shutdown_timeout: 30s

log:
  level: info      # debug | info | warn | error
  format: json     # json | console

observability:
  metrics:
    enabled: true
    path: /metrics
  tracing:
    enabled: false
    endpoint: ""
    service_name: x-beacon
    sample_ratio: 0.1

database:
  dsn: "postgres://xbeacon:xbeacon@localhost:5432/xbeacon?sslmode=disable"
  max_open_conns: 20
  max_idle_conns: 5
  conn_max_lifetime: 30m

redis:
  addr: "localhost:6379"
  password: ""
  db: 0
  pool_size: 50

# Provider configuration lives in configs/providers.yaml (loaded separately).
providers_file: configs/providers.yaml

# Authentication is backed by Postgres (api_keys table). To enable auth,
# set database.dsn above and run `xbctl migrate up` once. If the database
# is unreachable at startup, the gateway logs a warning and serves /v1/*
# unauthenticated (dev-mode behavior).
auth:
  cache:
    # Successful lookups are cached this long. 0 disables the cache layer
    # even when Redis is reachable.
    positive_ttl: 60s
    # Invalid-credentials results are cached briefly so a flood of bogus
    # tokens can't hammer the DB. Kept short so a freshly-issued key
    # isn't shadowed by a stale "not found".
    negative_ttl: 5s

# Rate-limiting rules (Week 5). Multiple rules compose: any rule rejects
# → request rejected (429). Empty list disables rate-limiting entirely.
#
# Algorithms:
#   memory_bucket — single-instance token bucket; uses `rate` ("100/s" |
#                   "60/m" | "1000/h") and optional `burst` (defaults to
#                   the per-second numerator).
#   redis_window  — distributed sliding window; uses `limit` and
#                   `window`. Requires redis.addr to be reachable.
#
# key_by composes the bucket key per rule. [] = global, ["api_key"] =
# per-API-key, ["api_key","model"] = per-key-per-model. Allowed dims:
# api_key, model.
rate_limits: []
# rate_limits:
#   - name: global-rps
#     algorithm: memory_bucket
#     rate: 1000/s
#     burst: 2000
#   - name: per-key-min
#     algorithm: redis_window
#     limit: 60
#     window: 1m
#     key_by: [api_key]
#   - name: per-key-model-hour
#     algorithm: redis_window
#     limit: 1000
#     window: 1h
#     key_by: [api_key, model]

# Router (Week 6): retry / fail-over / circuit-breaker decisions for upstream
# calls. Defaults below match DefaultPolicy + DefaultBreakerSettings; rare
# overrides only — most operators leave this section blank.
router:
  retry:
    # Beyond the first call. 2 = up to 3 total attempts before failover.
    max_retries: 2
    # Wall-clock cap across the whole chain (retries + failover hops).
    max_total: 30s
    # Full-jitter exponential envelope: random ∈ [0, base * 2^(n-1)] capped
    # at max_backoff. Retry-After from upstream trumps and is honored verbatim.
    base_backoff: 100ms
    max_backoff: 5s
  breaker:
    # Per-provider circuit breaker (sony/gobreaker two-step API). Trips when
    # failure_ratio is met AND min_requests have been seen in the current
    # rolling interval. Only retryable errors (5xx / timeout / rate-limit)
    # count — 4xx (auth, invalid request) leave the breaker calm.
    max_requests: 1       # half-open probe quota
    interval: 60s         # closed-state counter window
    timeout: 30s          # open → half-open transition
    failure_ratio: 0.5
    min_requests: 5

# Billing (Week 7): async request_logs writer + model_pricing reload.
# Defaults match production. Decrease worker.workers / buffer_size when
# request volume is light (saves goroutines + memory).
billing:
  worker:
    # Channel capacity. Full buffer drops events to keep the chat hot
    # path zero-blocking; drops are counted via DroppedCount() and will
    # be exposed as a Prometheus metric in Week 8.
    buffer_size: 10000
    # Consumer goroutines pulling from the channel. >1 lets a slow DB
    # not stall the queue; insertion order is no longer strictly
    # start-time monotonic but reports use started_at not id.
    workers: 2
    # Stop() drains for at most this long; remaining events are lost.
    flush_timeout: 5s
  # How often to refresh PricingCache from model_pricing. The HTTP
  # admin API + xbctl pricing both call cache.Set/Delete which
  # immediately update the in-memory snapshot of the writing instance —
  # this interval is the bottom-line consistency guarantee for
  # multi-instance deployments.
  pricing_reload_interval: 30m

cache:
  exact:
    enabled: true
    ttl: 1h
  semantic:
    # Off by default — enabling pulls in OpenAI embedding costs and a
    # RediSearch index per model (~6 KiB per 1.5k-dim vector + HNSW
    # graph overhead). Turn on once your prompt diversity is low enough
    # that the cost vs. cache-hit math actually wins.
    enabled: false
    # Cosine similarity (NOT distance). 0.95 = "near-identical
    # semantics"; lower values trade recall for false-positive risk.
    threshold: 0.95
    # Vector inputs / KNN ranker. Defaults match a typical OpenAI
    # account; swap embedding_endpoint to point at Azure or a private
    # gateway if needed.
    embedding_model: text-embedding-3-small
    embedding_endpoint: https://api.openai.com
    # Falls back to $OPENAI_API_KEY if empty after env-expansion.
    embedding_api_key: ${OPENAI_API_KEY:-}
    # 0 = use the embedder's native dimension (1536 for the small
    # model). Lower truncates the vector to save Redis index memory at
    # the cost of recall.
    embedding_dimensions: 0
    # KNN candidate count per lookup. K=1 is sufficient; larger leaves
    # room for re-ranking experiments later.
    top_k: 5
    # Per-process LRU on flatten(text) → vector. Each entry ≈
    # 4*dim+text bytes (~6 KiB at 1536 dim); 1024 ≈ 6 MiB.
    query_lru_capacity: 1024
    # Per-model RediSearch IndexName prefix. Decision 2 (Phase 3):
    # one index per model for true cross-model isolation. Drop a
    # model's cache via:
    #   FT.DROPINDEX <prefix><sanitized-model> DD
    index_name_prefix: x_beacon_semcache_
