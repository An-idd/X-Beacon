run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

output:
  formats:
    - format: colored-line-number
  sort-results: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - gocritic
    - gosec
    - misspell
    - revive
    - unconvert
    - unparam
    - bodyclose
    - noctx
    - contextcheck
    - errorlint
    - nilerr
    - prealloc

linters-settings:
  goimports:
    local-prefixes: github.com/An-idd/x-beacon
  govet:
    enable-all: true
    disable:
      - fieldalignment
  revive:
    rules:
      - name: exported
        severity: warning
        disabled: false
      - name: package-comments
        disabled: true
  gosec:
    excludes:
      - G104  # unhandled errors — covered by errcheck
  gocritic:
    disabled-checks:
      - ifElseChain
      - hugeParam

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
        - unparam
        - gocritic
    - path: cmd/
      linters:
        - gochecknoglobals
